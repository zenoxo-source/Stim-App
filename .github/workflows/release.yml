name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build ONLY — never publish from electron-builder (avoids dual-release race
      # when nsis + portable both call the GitHub API simultaneously).
      - name: Build Windows packages
        env:
          # Optional code signing (repo secrets). Omit for unsigned builds.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run build:app

      # Remove any broken/duplicate releases for this tag + legacy broken tags
      - name: Remove previous release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          cleanup_tag() {
            local t="$1"
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name==\"${t}\") | .id" \
              | while read -r id; do
                  echo "Deleting release id=${id} for tag ${t}"
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${id}" || true
                done
          }
          cleanup_tag "${TAG}"
          # One-time hygiene: broken dual v1.3.0 releases from builder race
          if [ "${TAG}" != "v1.3.0" ]; then
            cleanup_tag "v1.3.0"
          fi

      - name: Publish single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            backend/dist-app/StimApp-*-win-x64.exe
            backend/dist-app/StimApp-*-portable.exe
            backend/dist-app/StimApp-*.blockmap
            backend/dist-app/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
