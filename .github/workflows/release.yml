name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build ONLY — never publish from electron-builder (avoids dual-release race
      # when nsis + portable both call the GitHub API simultaneously).
      - name: Build Windows packages
        run: npm run build:app

      # Remove any broken/duplicate releases for this tag (GITHUB_TOKEN has write)
      - name: Remove previous release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          # Delete all releases that claim this tag (handles duplicates)
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq ".[] | select(.tag_name==\"${TAG}\") | .id" \
            | while read -r id; do
                echo "Deleting release id=${id} for tag ${TAG}"
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${id}" || true
              done

      - name: Publish single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            backend/dist-app/StimApp-*-win-x64.exe
            backend/dist-app/StimApp-*-portable.exe
            backend/dist-app/StimApp-*.blockmap
            backend/dist-app/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
