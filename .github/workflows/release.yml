name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Windows packages
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run build:app

      - name: Remove previous release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          cleanup_tag() {
            local t="$1"
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name==\"${t}\") | .id" \
              | while read -r id; do
                  echo "Deleting release id=${id} for tag ${t}"
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${id}" || true
                done
          }
          cleanup_tag "${TAG}"
          if [ "${TAG}" != "v1.3.0" ]; then
            cleanup_tag "v1.3.0"
          fi

      - name: Publish single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            backend/dist-app/StimApp-*-win-x64.exe
            backend/dist-app/StimApp-*-portable.exe
            backend/dist-app/StimApp-*.blockmap
            backend/dist-app/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    needs: windows
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build macOS packages
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:app

      - name: Publish macOS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            backend/dist-app/StimApp-*-mac-*.dmg
            backend/dist-app/StimApp-*-mac-*.zip
            backend/dist-app/StimApp-*-mac-*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    needs: windows
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0t64 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0t64 \
            libdrm2 \
            libgbm1 \
            libasound2t64 \
            libfuse2t64 \
            libxkbfile1 \
            libsecret-1-0

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Linux packages
        run: npm run build:app

      - name: Publish Linux artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            backend/dist-app/StimApp-*-linux-*.AppImage
            backend/dist-app/StimApp-*-linux-*.deb
            backend/dist-app/StimApp-*-linux-*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
